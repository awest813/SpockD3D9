# The Elder Scrolls IV: Oblivion (Steam, Windows) — SpockD3D9 profile
# ====================================================================
# Engine: Gamebryo (NetImmerse-derived) · API: Direct3D 9 (SM2.0 / SM3.0 + FFP)
#
# Usage (an external Windows host, e.g. Wine — see tools/oblivion/README.md):
#   Copy this file next to Oblivion.exe and rename it to "dxvk.conf",
#   or point DXVK_CONFIG_FILE at it inside the Wine prefix.
#
# Every key below is a documented SpockD3D9 option (see ../../dxvk.conf).
# Values are conservative defaults for a first boot-to-menu attempt on
# Apple Silicon via MoltenVK; tune from there using the benchmark tracker
# (docs/WINDOWS_D3D9_BENCHMARKS.md).

# --- Shader pipeline -------------------------------------------------------

# Persist compiled pipelines across runs. Gamebryo compiles many small shaders;
# caching is the single biggest stutter reduction on the SPIR-V → MSL path.
dxvk.enableShaderCache = True

# Apple GPUs are tile-based; Auto enables MoltenVK tiler heuristics in DXVK.
dxvk.tilerMode = Auto

# Oblivion / Gamebryo targets Shader Model 3. Keep the default (3); pinned
# here so the profile is self-documenting.
d3d9.shaderModel = 3

# --- Presentation ----------------------------------------------------------

# Gamebryo's mode picker can land on an odd refresh rate inside a Wine prefix.
# Force 60 Hz for predictable pacing. Adjust to your display if needed.
d3d9.forceRefreshRate = 60

# Keep input latency low; Gamebryo is sensitive to deep present queues.
d3d9.maxFrameLatency = 1

# Honor the game's requested vsync / present interval rather than overriding it.
# (0 = let the application choose.)
d3d9.presentInterval = 0

# --- Device loss -----------------------------------------------------------

# Gamebryo calls TestCooperativeLevel + Reset on focus changes. Under a Wine
# host the window is the host's, so do NOT synthesize device loss on focus loss;
# that path is for native (SDL/GLFW) focus tracking, not hosted windows.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (commented; enable while diagnosing) ------------------

# Strict float emulation — try this first if lighting/horizon shows banding or
# NaN-style artifacts on Apple GPUs.
# d3d9.floatEmulation = Strict

# Cap the frame rate if the engine's physics/timing misbehaves when unbounded
# (classic Gamebryo issue above ~60 fps).
# d3d9.maxFrameRate = 60
