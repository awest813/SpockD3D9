# Fallout: New Vegas (Steam/GOG, Windows) - SpockD3D9 profile
# =============================================================
# Engine: Gamebryo (Fallout 3 lineage) - API: Direct3D 9 (SM2.0 / SM3.0 + FFP)
#
# Usage (external Windows host):
#   Copy this file next to FalloutNV.exe and rename it to "dxvk.conf",
#   or point DXVK_CONFIG_FILE at it inside the host prefix.
#
# Every active key below is validated by tests/conf/test_dxvk_conf_profiles.py
# against the option set documented in ../../dxvk.conf.

# --- Shader pipeline -------------------------------------------------------

# Persist compiled pipelines across runs. New Vegas compiles many small
# Gamebryo shaders; caching reduces repeat SPIR-V -> MSL stutter on MoltenVK.
dxvk.enableShaderCache = True

dxvk.tilerMode = Auto

# New Vegas targets Shader Model 3 on modern settings. Pin this so benchmark
# runs do not accidentally test a reduced caps path.
d3d9.shaderModel = 3

# --- Presentation ----------------------------------------------------------

# Keep mode enumeration predictable for Gamebryo's launcher and in-game mode
# picker. High refresh rates can expose physics/timing bugs in this engine.
d3d9.forceRefreshRate = 60

# Keep input latency low and avoid deep present queues while benchmarking.
d3d9.maxFrameLatency = 1

# Honor the game's requested vsync / present interval rather than overriding it.
# (0 = let the application choose.)
d3d9.presentInterval = 0

# --- Device loss -----------------------------------------------------------

# Under an external Windows host, the window belongs to the host. Do not
# synthesize native WSI focus-loss device loss for hosted Gamebryo windows.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (commented; enable while diagnosing) ------------------

# If HDR, water, horizon, or fixed-function lighting shows precision artifacts,
# retry with strict D3D9 float emulation.
# d3d9.floatEmulation = Strict

# Cap the render loop if physics/timing misbehaves above 60 fps.
# d3d9.maxFrameRate = 60

# Force MoltenVK tiler heuristics only if Auto fails to detect the driver.
# dxvk.tilerMode = True
