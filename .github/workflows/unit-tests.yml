name: Unit tests (native shims)

on: [push, pull_request, workflow_dispatch]

jobs:
  win32-compat:
    runs-on: ubuntu-latest
    name: Win32 compat shims
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Native Win32 compatibility shims (util_win32_compat.h): semaphores, events,
    # single/multi-object waits, DuplicateHandle. Hermetic — only needs g++ and
    # the in-tree native Windows headers (no Vulkan/SDL).
    - name: Build and run
      run: |
        g++ -std=c++17 -O2 -Wall -Wextra -pthread \
          -Isrc/util -Iinclude/native/windows \
          tests/util/test_win32_compat.cpp -o test_win32_compat
        ./test_win32_compat

    # The handle objects are concurrency primitives; run the same test under
    # ThreadSanitizer to catch data races in the reference counting and waits.
    - name: Build and run (ThreadSanitizer)
      run: |
        g++ -std=c++17 -O1 -g -fsanitize=thread -pthread \
          -Isrc/util -Iinclude/native/windows \
          tests/util/test_win32_compat.cpp -o test_win32_compat_tsan
        ./test_win32_compat_tsan

  homebrew-prefixes:
    runs-on: ubuntu-latest
    name: macOS Homebrew prefix order
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Intel Mac Homebrew uses /usr/local; Apple Silicon uses /opt/homebrew.
    - name: Verify Intel (x86_64) prefix order
      run: |
        g++ -std=c++17 -O2 -Wall -Wextra \
          -D__APPLE__ -DDXVK_TEST_HOMEBREW_INTEL_SLICE \
          -Isrc/util -Iinclude/native/windows -Iinclude/native \
          tests/util/test_homebrew_prefixes.cpp -o test_homebrew_intel
        ./test_homebrew_intel

    - name: Verify Apple Silicon (arm64) prefix order
      run: |
        g++ -std=c++17 -O2 -Wall -Wextra \
          -D__APPLE__ -DDXVK_TEST_HOMEBREW_ARM_SLICE \
          -Isrc/util -Iinclude/native/windows -Iinclude/native \
          tests/util/test_homebrew_prefixes.cpp -o test_homebrew_arm
        ./test_homebrew_arm

  conf-profiles:
    runs-on: ubuntu-latest
    name: dxvk.conf profiles
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Title profiles (e.g. tools/fallout3/fallout3.dxvk.conf) must only set keys
    # that SpockD3D9 documents in the repository-root dxvk.conf. This guard is
    # hermetic — it needs only the Python standard library, no Vulkan/SDL/build.
    - name: Validate shipped dxvk.conf profiles
      run: python3 tests/conf/test_dxvk_conf_profiles.py

  shell-tools:
    runs-on: ubuntu-latest
    name: User-facing shell tools
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Boot-to-menu log parsing should stay usable before users have a Vulkan
    # setup or a Wine-family host available; these tests only need bash/Python.
    - name: Validate boot log checker
      run: python3 tests/scripts/test_check_boot_logs.py
