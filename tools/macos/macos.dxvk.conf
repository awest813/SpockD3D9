# macOS / MoltenVK — SpockD3D9 platform profile
# =================================================
# Conservative defaults for native D3D9 ports on Apple Silicon and Intel Macs.
# Vulkan is provided by MoltenVK (SPIR-V → MSL at runtime).
#
# Usage:
#   Copy this file next to your application and rename it to "dxvk.conf", or
#   set DXVK_CONFIG_FILE=/path/to/macos.dxvk.conf
#
# This profile intentionally omits DXGI/D3D11-only options. See the root
# dxvk.conf for the full upstream option reference (most D3D11/DXGI keys are
# inert in D3D9-only builds but remain documented for compatibility).

# --- MoltenVK / Apple GPU --------------------------------------------------

# Auto enables tiler heuristics when VK_DRIVER_ID_MOLTENVK is detected.
# Leave at Auto unless A/B testing; Apple GPUs are tile-based.
dxvk.tilerMode = Auto

# Persist compiled pipelines across runs. Strongly recommended on macOS where
# SPIR-V → MSL conversion happens at first use.
dxvk.enableShaderCache = True

# --- D3D9 presentation -----------------------------------------------------

# Honor the application's present interval unless you need to override vsync.
d3d9.presentInterval = 0

# Keep input latency low for windowed ports.
d3d9.maxFrameLatency = 1

# Do not synthesize device loss on native focus changes unless a title needs it.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (uncomment while diagnosing) --------------------------

# Strict float emulation if lighting shows banding or NaN-style artifacts.
# d3d9.floatEmulation = Strict

# Cap frame rate if physics/timing misbehaves above display refresh.
# d3d9.maxFrameRate = 60

# Force a refresh rate when mode enumeration is unreliable.
# d3d9.forceRefreshRate = 60

# Defer VkSurface creation until the first Present (rarely needed on macOS).
# d3d9.deferSurfaceCreation = False
