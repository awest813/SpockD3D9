# Galactic Civilizations II (Windows) - SpockD3D9 profile
# ========================================================
# Engine: Stardock strategy renderer - API: Direct3D 9
#
# Usage (external Windows host):
#   Copy this file next to the active GalCiv II executable and rename it to
#   "dxvk.conf", or point DXVK_CONFIG_FILE at it inside the host prefix.
#   Common executables include GC2TwilightOfTheArnor.exe, GC2DarkAvatar.exe,
#   and GC2.exe depending on edition/expansion.
#
# Every active key below is validated by tests/conf/test_dxvk_conf_profiles.py
# against the option set documented in ../../dxvk.conf.

# --- Shader pipeline -------------------------------------------------------

# Persist compiled pipelines across runs to reduce repeat SPIR-V -> MSL
# compilation stutter on MoltenVK.
dxvk.enableShaderCache = True

# Keep full D3D9 shader caps exposed for the benchmark path.
d3d9.shaderModel = 3

# --- Presentation ----------------------------------------------------------

# Older strategy-game launchers and settings dialogs can behave poorly when a
# host exposes many unusual macOS display modes. Keep the initial mode list
# small and Windows-like while the game is being brought up.
d3d9.modeCountCompatibility = True

# Keep timing predictable and avoid high-refresh behavior until basic gameplay
# and UI rendering are validated.
d3d9.forceRefreshRate = 60

# Reduce queue depth for deterministic UI/input response while benchmarking.
d3d9.maxFrameLatency = 1

# Honor the application's present interval request.
# (0 = let the application choose.)
d3d9.presentInterval = 0

# --- Device loss -----------------------------------------------------------

# Hosted Windows games receive focus/window messages from the external host, not
# native SDL/GLFW/WSI. Avoid synthetic focus-loss device loss in that path.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (commented; enable while diagnosing) ------------------

# Try strict float emulation if map overlays, lighting, or UI compositing show
# precision artifacts on Apple GPUs.
# d3d9.floatEmulation = Strict

# If the launcher chooses an unexpected vendor path, pin a Windows-like adapter
# identity while collecting logs.
# d3d9.customVendorId = 10de
# d3d9.customDeviceId = 1c82
# d3d9.customDeviceDesc = "NVIDIA GeForce GTX 1050 Ti"

# Force MoltenVK tiler heuristics only if Auto fails to detect the driver.
# dxvk.tilerMode = True
