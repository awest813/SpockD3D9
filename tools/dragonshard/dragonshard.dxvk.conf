# Dungeons & Dragons: Dragonshard (Windows) - SpockD3D9 profile
# ==============================================================
# Engine: Liquid Entertainment RTS/RPG renderer - API: Direct3D 9.0c
# Release: 2005 (32-bit) - Hardware T&L, largely fixed-function pipeline.
# Editions: retail (Atari) and GOG DRM-free re-release.
#
# Usage (external Windows host):
#   Copy this file next to the active Dragonshard executable and rename it to
#   "dxvk.conf", or point DXVK_CONFIG_FILE at it inside the host prefix.
#   The main executable is "Dragonshard.exe" (verify in the installed game
#   folder; the GOG build keeps the retail name).
#
# The DLL must be the 32-bit (i686) PE d3d9.dll: Dragonshard is a 32-bit
# process and can only load a 32-bit d3d9.dll. Build with:
#   ./scripts/build-pe-d3d9.sh --arch x86
#
# Every active key below is validated by tests/conf/test_dxvk_conf_profiles.py
# against the option set documented in ../../dxvk.conf.

# --- Shader pipeline -------------------------------------------------------

# Persist compiled pipelines across runs to reduce repeat SPIR-V -> MSL
# compilation stutter on MoltenVK. Dragonshard is fixed-function heavy, so the
# cache mostly benefits the fixed-function -> SPIR-V translations.
dxvk.enableShaderCache = True

dxvk.tilerMode = Auto

# Expose full D3D9 shader caps. Dragonshard predates SM3 usage in practice, but
# advertising SM3 caps is harmless and matches the other benchmark profiles.
d3d9.shaderModel = 3

# --- Presentation ----------------------------------------------------------

# Dragonshard's launcher/settings dialog is fragile on modern displays (the
# reason a DxWrapper "Windows 10 fix" exists). Keep the initial mode list small
# and Windows-like so the mode picker doesn't choke on macOS display modes.
d3d9.modeCountCompatibility = True

# Pin a conventional refresh rate until in-game rendering is validated; the
# 2005 timing code does not expect high-refresh displays.
d3d9.forceRefreshRate = 60

# Reduce queue depth for responsive RTS mouse/keyboard input.
d3d9.maxFrameLatency = 1

# Honor the application's present interval request.
# (0 = let the application choose.)
d3d9.presentInterval = 0

# --- Device loss -----------------------------------------------------------

# Hosted Windows games receive focus/window messages from the external host, not
# native SDL/GLFW/WSI. Avoid synthetic focus-loss device loss in that path.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (commented; enable while diagnosing) ------------------

# Try strict float emulation if terrain, fog-of-war, or UI compositing show
# precision artifacts on Apple GPUs.
# d3d9.floatEmulation = Strict

# If the launcher/T&L detection chooses an unexpected vendor path, pin a
# Windows-like adapter identity while collecting logs.
# d3d9.customVendorId = 10de
# d3d9.customDeviceId = 1c82
# d3d9.customDeviceDesc = "NVIDIA GeForce GTX 1050 Ti"

# Force MoltenVK tiler heuristics only if Auto fails to detect the driver.
# dxvk.tilerMode = True
