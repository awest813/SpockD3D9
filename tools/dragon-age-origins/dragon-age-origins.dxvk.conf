# Dragon Age: Origins (Steam/GOG/EA App, Windows) - SpockD3D9 profile
# ===================================================================
# Engine: BioWare Eclipse - API: Direct3D 9 (SM3.0 renderer)
#
# Usage (external Windows host):
#   Copy this file next to daorigins.exe and rename it to "dxvk.conf",
#   or point DXVK_CONFIG_FILE at it inside the host prefix.
#
# Every active key below is validated by tests/conf/test_dxvk_conf_profiles.py
# against the option set documented in ../../dxvk.conf.

# --- Shader pipeline -------------------------------------------------------

# DAO uses many material/effect variants. Persist translated pipelines across
# runs to reduce repeat SPIR-V -> MSL compilation stutter on MoltenVK.
dxvk.enableShaderCache = True

# DAO's D3D9 renderer expects SM3-class caps. Keep the benchmark profile pinned
# to the intended renderer path.
d3d9.shaderModel = 3

# --- Presentation ----------------------------------------------------------

# Keep mode selection predictable for the launcher and fullscreen transitions.
# This also avoids exercising high-refresh timing paths before basic rendering
# compatibility is established.
d3d9.forceRefreshRate = 60

# Reduce queue depth for more deterministic input/presentation behavior.
d3d9.maxFrameLatency = 1

# Honor the application's present interval request.
# (0 = let the application choose.)
d3d9.presentInterval = 0

# --- Device loss -----------------------------------------------------------

# Hosted Windows games receive focus/window messages from the external host, not
# native SDL/GLFW/WSI. Avoid synthetic focus-loss device loss in that path.
d3d9.deviceLossOnFocusLoss = False

# --- Optional tuning (commented; enable while diagnosing) ------------------

# Try strict float emulation if terrain lighting, character skinning, or spell
# effects show precision artifacts on Apple GPUs.
# d3d9.floatEmulation = Strict

# If the launcher or renderer chooses an unexpected GPU/vendor path, pin a
# Windows-like adapter identity while collecting logs.
# d3d9.customVendorId = 10de
# d3d9.customDeviceId = 1c82
# d3d9.customDeviceDesc = "NVIDIA GeForce GTX 1050 Ti"

# Force MoltenVK tiler heuristics only if Auto fails to detect the driver.
# dxvk.tilerMode = True
